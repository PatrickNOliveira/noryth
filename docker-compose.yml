# Local development infrastructure for Noryth.
# Brings up PostgreSQL (database) and MinIO (object storage for cover images).
# Redis, BullMQ and OpenAI are intentionally NOT included in this story.
#
#   docker compose up -d
#
# MinIO console: http://localhost:9001  (login: minioadmin / minioadmin)

services:
  postgres:
    image: postgres:16-alpine
    container_name: noryth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: noryth
      POSTGRES_PASSWORD: noryth
      POSTGRES_DB: noryth
    ports:
      - '5432:5432'
    volumes:
      - noryth_pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: noryth-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # web console
    volumes:
      - noryth_minio_data:/data

volumes:
  noryth_pg_data:
  noryth_minio_data:
