name: Deploy

# Build the API and Web images, publish them to GHCR, then deploy them to the
# VPS over SSH. Postgres and MinIO are external and untouched by this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_image: ${{ steps.meta.outputs.api_image }}
      web_image: ${{ steps.meta.outputs.web_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names (lowercase)
        id: meta
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "api_image=${REGISTRY}/${repo_lc}/noryth-api" >> "$GITHUB_OUTPUT"
          echo "web_image=${REGISTRY}/${repo_lc}/noryth-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}:latest
            ${{ steps.meta.outputs.api_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}:latest
            ${{ steps.meta.outputs.web_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy VPS scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: scripts/vps/setup-nginx-https.sh
          target: /opt/noryth

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: API_IMAGE,WEB_IMAGE,IMAGE_SHA,GHCR_USERNAME,GHCR_TOKEN,API_ENV_FILE,WEB_ENV_FILE,APP_DOMAIN,API_DOMAIN,ENABLE_HTTPS,LETSENCRYPT_EMAIL
          script_stop: true
          script: |
            set -e

            APP_DIR=/opt/noryth
            mkdir -p "$APP_DIR"

            # Write env files from secrets (contents never touch the image).
            printf '%s' "$API_ENV_FILE" > "$APP_DIR/api.env"
            printf '%s' "$WEB_ENV_FILE" > "$APP_DIR/web.env"
            chmod 600 "$APP_DIR/api.env" "$APP_DIR/web.env"

            # Authenticate to GHCR to pull the images.
            echo "$GHCR_TOKEN" | docker login "${API_IMAGE%%/*}" -u "$GHCR_USERNAME" --password-stdin

            docker pull "$API_IMAGE:latest"
            docker pull "$WEB_IMAGE:latest"

            # Run pending migrations BEFORE swapping the API (explicit, one-shot).
            docker run --rm --env-file "$APP_DIR/api.env" "$API_IMAGE:latest" npm run migration:run:prod

            # Replace the API container — bound to localhost only (Nginx fronts it).
            docker stop noryth-api || true
            docker rm noryth-api || true
            docker run -d \
              --name noryth-api \
              --restart unless-stopped \
              --env-file "$APP_DIR/api.env" \
              -p 127.0.0.1:3000:3000 \
              "$API_IMAGE:latest"

            # Replace the Web container — bound to localhost only (Nginx fronts it).
            docker stop noryth-web || true
            docker rm noryth-web || true
            docker run -d \
              --name noryth-web \
              --restart unless-stopped \
              --env-file "$APP_DIR/web.env" \
              -p 127.0.0.1:8080:80 \
              "$WEB_IMAGE:latest"

            # Configure Nginx reverse proxy (+ HTTPS when ENABLE_HTTPS=true).
            chmod +x "$APP_DIR/scripts/vps/setup-nginx-https.sh"
            APP_DOMAIN="$APP_DOMAIN" \
            API_DOMAIN="$API_DOMAIN" \
            ENABLE_HTTPS="$ENABLE_HTTPS" \
            LETSENCRYPT_EMAIL="$LETSENCRYPT_EMAIL" \
            bash "$APP_DIR/scripts/vps/setup-nginx-https.sh"

            # Give them a moment, then verify both are running.
            sleep 5
            for c in noryth-api noryth-web; do
              running=$(docker inspect -f '{{.State.Running}}' "$c" 2>/dev/null || echo "false")
              if [ "$running" != "true" ]; then
                echo "::error::Container $c is not running"
                docker logs --tail 60 "$c" || true
                exit 1
              fi
              echo "OK: $c is running"
            done

            docker image prune -f || true
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          IMAGE_SHA: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          API_ENV_FILE: ${{ secrets.API_ENV_FILE }}
          WEB_ENV_FILE: ${{ secrets.WEB_ENV_FILE }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN || 'noryth.io' }}
          API_DOMAIN: ${{ vars.API_DOMAIN || 'api.noryth.io' }}
          ENABLE_HTTPS: ${{ vars.ENABLE_HTTPS || 'false' }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
